<html>

<head>
	<style type="text/css">
		.table {
			display: table;
		}

		.row {
			display: table-row;
		}

		.cell {
			display: table-cell;
		}

		.gray-border-3px {
			border-style: solid;
			border-color: gray;
			border-width: 3px;
			border-radius: 5px;
		}

		.oragne-background {
			background-color: orange;
		}

		.div-alignment-center {
			margin: 0 auto;
		}
	</style>
</head>

<body>
	<div class="table gray-border-3px oragne-background div-alignment-center"
		style="padding-top: 5px;padding-right: 5px;padding-left:5px;">
		<div class="row">
			<div class="cell">while(true)</div>
			<div class="cell" style="transform: rotate(270deg);text-align: center;">⤴️</div>
		</div>
		<div class="row">
			<div class="cell">{
				console.log('test');<br />
				console.log('test');<br />
				console.log('test');<br />
				}</div>
			<div class="cell" style="vertical-align: middle;">⬆️<br />🔁<br />⬆️</div>
		</div>
		<div class="row">
			<div class="cell" style="display: table-cell;text-align: right;"></div>
			<div style="display: table-cell;text-align: right;">⤴️</div>
		</div>
	</div>
	</div>
</body>

</html>
