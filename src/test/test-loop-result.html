<html>

<head>
	<style type="text/css">
		.table {
			display: table;
		}

		.row {
			display: table-row;
		}

		.cell {
			display: table-cell;
		}

		.gray-border-3px {
			border-style: solid;
			border-color: gray;
			border-width: 3px;
			border-radius: 5px;
		}

		.oragne-background {
			background-color: orange;
		}

		.skyblue-background {
			background-color: skyblue;
		}

		.div-alignment-center {
			margin: 0 auto;
		}
	</style>
</head>

<body>
	<div class="table gray-border-3px div-alignment-center"
		style="padding-top: 5px;padding-right: 5px;padding-left:5px;">
		<div class="row">
			<div class="cell oragne-background">while(true)</div>
			<div class="cell skyblue-background">
			<div style="transform: rotate(270deg);margin: 0 0 0 -1px;">⤴️</div>	
			</div>
		</div>
		<div class="row">
			<div class="cell oragne-background">{
				console.log('test');<br />
				console.log('test');<br />
				console.log('test');<br />
				}</div>
			<div class="cell skyblue-background" style=" position:relative;">
				<!-- <div>⬆️</div> -->
				<div style="position:absolute; top:0">🔁</div>
				<!-- <div>⬆️</div> -->
				<div style="position:absolute;bottom:0;">⤴️</div>
			</div>
		</div>
	</div>
	</div>
</body>

</html>
